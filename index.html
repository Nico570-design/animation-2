<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Hero — Design Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;
  height:100%;
  background:transparent;
  font-family:'DM Sans',system-ui,sans-serif;
  overflow:hidden;
}

/* ── STAGE — full transparent ── */
#stage{
  position:relative;
  width:100%;
  height:100vh;
  background:transparent;
  overflow:hidden;
}

/* ── POST-ITS ── */
#postits-container{position:absolute;inset:0;z-index:2}

.pt{
  position:absolute;
  width:216px;
  border-radius:18px;
  overflow:hidden;
  will-change:transform;
  z-index:2;
  background:#FFFFFF;
  border:1px solid rgba(42,31,20,.06);
  box-shadow:
    0 1px 2px rgba(42,31,20,.04),
    0 4px 10px rgba(42,31,20,.06);
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
.pt:active{cursor:grabbing}
.pt.dragging{
  z-index:999 !important;
  box-shadow:
    0 4px 8px rgba(42,31,20,.08),
    0 16px 32px rgba(42,31,20,.16),
    0 32px 64px rgba(42,31,20,.12) !important;
  transition:box-shadow .2s ease, transform .15s ease;
}

.pt-face{padding:18px 16px 16px;background:#FEFCFA}

.pt-logo{
  width:36px;height:36px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;line-height:1;
  margin-bottom:12px;
  flex-shrink:0;
}

.pt-title{
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:700;
  color:#1A1208;line-height:1.28;
  letter-spacing:-.01em;
  margin-bottom:3px;display:block;
}
.pt-sub{
  font-family:'DM Sans',sans-serif;
  font-size:10.5px;color:rgba(42,31,20,.45);
  margin-bottom:14px;display:block;
  font-weight:400;line-height:1.4;
}
.pt-tags{display:flex;flex-wrap:wrap;gap:4px}
.pt-tag{
  font-family:'DM Sans',sans-serif;
  font-size:9px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  padding:4px 9px;border-radius:100px;
}

.pt-foot{
  padding:9px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.pt-foot-txt{
  font-family:'Space Mono',monospace;
  font-size:7.5px;letter-spacing:.1em;
  text-transform:uppercase;font-weight:400;
}
.pt-foot-dot{font-size:14px;opacity:.4}

/* Colors */
.pt[data-c="teal"]   .pt-logo{background:#DCF4FC}
.pt[data-c="purple"] .pt-logo{background:#FBE6FF}
.pt[data-c="orange"] .pt-logo{background:#FEF0E7}
.pt[data-c="green"]  .pt-logo{background:#EAF9C2}

.pt[data-c="teal"]   .pt-foot{background:rgba(3,120,135,.09)}
.pt[data-c="purple"] .pt-foot{background:rgba(129,84,145,.09)}
.pt[data-c="orange"] .pt-foot{background:rgba(255,103,36,.08)}
.pt[data-c="green"]  .pt-foot{background:rgba(36,124,25,.08)}

.pt[data-c="teal"]   .pt-foot-txt{color:#037887}
.pt[data-c="purple"] .pt-foot-txt{color:#815491}
.pt[data-c="orange"] .pt-foot-txt{color:#FF6724}
.pt[data-c="green"]  .pt-foot-txt{color:#247C19}

.pt[data-c="teal"]   .pt-tag{background:rgba(3,120,135,.1);color:#026070}
.pt[data-c="purple"] .pt-tag{background:rgba(129,84,145,.1);color:#6A4480}
.pt[data-c="orange"] .pt-tag{background:rgba(255,103,36,.1);color:#CC5020}
.pt[data-c="green"]  .pt-tag{background:rgba(36,124,25,.1);color:#1A6014}

/* ── ORGANIZE BUTTON ── */
#organize-area{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;align-items:center;
  transition:opacity .5s ease,transform .5s ease;
}
#organize-area.hide{
  opacity:0;
  pointer-events:none;
  transform:translateX(-50%) translateY(12px);
}

.organize-btn{
  display:inline-flex;align-items:center;gap:9px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  padding:12px 22px;
  background:linear-gradient(180deg,#FFFFFF 0%,#FAFAFA 100%);
  color:#1A1208;
  border:1px solid rgba(0,0,0,.08);
  border-radius:8px;
  cursor:pointer;
  letter-spacing:-.01em;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 1px 0 rgba(255,255,255,.9) inset,
    0 1px 2px rgba(0,0,0,.04),
    0 4px 16px rgba(0,0,0,.06),
    0 12px 32px rgba(0,0,0,.05);
  transition:transform .2s ease,box-shadow .25s ease,background .2s ease;
}
.organize-btn::before{
  content:'';position:absolute;top:0;left:-60%;
  width:50%;height:100%;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);
  transform:skewX(-20deg);
  transition:left .6s ease;
  pointer-events:none;
}
.organize-btn:hover::before{left:130%}
.organize-btn:hover{
  background:linear-gradient(180deg,#FFFFFF 0%,#F5F5F5 100%);
  transform:translateY(-1px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.9) inset,
    0 2px 4px rgba(0,0,0,.06),
    0 8px 24px rgba(0,0,0,.08),
    0 20px 40px rgba(0,0,0,.06);
}
.organize-btn:active{transform:translateY(0)}
.org-icon{
  font-size:15px;display:inline-block;color:#037887;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  animation:org-icon-twinkle 2.2s ease-in-out infinite;
  transform-origin:center;
}
@keyframes org-icon-twinkle{
  0%,100%{transform:rotate(0deg) scale(1);filter:drop-shadow(0 0 0 rgba(3,120,135,0))}
  25%{transform:rotate(90deg) scale(1.15);filter:drop-shadow(0 0 6px rgba(3,120,135,.55))}
  50%{transform:rotate(180deg) scale(1);filter:drop-shadow(0 0 2px rgba(3,120,135,.2))}
  75%{transform:rotate(270deg) scale(1.15);filter:drop-shadow(0 0 6px rgba(3,120,135,.55))}
}
.organize-btn:hover .org-icon{animation-play-state:paused;transform:rotate(180deg) scale(1.1)}

/* ── BOOK MOCKUP ── */
#book-mockup{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:5;pointer-events:none;
}
#book3d{
  opacity:0;transform:translateY(70px) scale(.9);
  transition:opacity .7s ease,transform 1.1s cubic-bezier(.34,1.18,.64,1);
}
#book3d.entering{opacity:1;transform:translateY(0) scale(1)}
#book3d.floating{animation:bstk-float 4.2s ease-in-out infinite}
@keyframes bstk-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

.book-img{
  width:700px;
  max-width:90%;
  height:auto;
  display:block;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.08));
}

/* Reset supprimé — contrôlé via postMessage depuis Framer */

/* Responsive */
@media (max-width:760px){
  .book-img{width:90%}
  .pt{transform:scale(.55)}
}
</style>
</head>
<body>

<div id="stage">
  <div id="postits-container"></div>

  <!-- Organize button -->
  <div id="organize-area">
    <button class="organize-btn" id="organize-btn">
      <span class="org-icon">✦</span>&nbsp;Organiser
    </button>
  </div>

  <!-- Book mockup -->
  <div id="book-mockup">
    <div id="book3d">
      <img src="mockup.png" alt="Livre blanc Design Ops" class="book-img">
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════
   POST-ITS DATA
════════════════════════════════ */
const PT = [
  { text:'Design Tokens',  sub:'Couleurs, typos, spacing',   c:'teal',   icon:'🎨', tags:['FIGMA','FONDATION'],   foot:'SOCLE DU DS',       sx:'3%',  sy:'3%',  rot:-11, z:4  },
  { text:'Research Repo',  sub:'Centraliser les insights',    c:'purple', icon:'📂', tags:['NOTION','SYNTHÈSE'],   foot:'MÉMOIRE ÉQUIPE',    sx:'33%', sy:'1%',  rot:6,   z:8  },
  { text:'Onboarding',     sub:'Kit starter recrues',         c:'orange', icon:'🚀', tags:['J+1','PROCESS'],       foot:'INTÉGRATION',       sx:'58%', sy:'7%',  rot:-8,  z:3  },
  { text:'Rituels',        sub:'Critique, reviews, synchro',  c:'green',  icon:'🔄', tags:['HEBDO','ÉQUIPE'],      foot:'CADENCE FIXE',      sx:'7%',  sy:'38%', rot:14,  z:6  },
  { text:'Composants',     sub:'Bibliothèque Figma unifiée',  c:'teal',   icon:'⬡',  tags:['UI KIT','ATOMIC'],     foot:'SOURCE DE VÉRITÉ',  sx:'35%', sy:'31%', rot:-5,  z:10 },
  { text:'Guidelines',     sub:'Ton de voix & principes',     c:'purple', icon:'📖', tags:['ÉDITO','ACCÈS'],       foot:'DÉCISIONS ÉCRITES', sx:'61%', sy:'34%', rot:10,  z:7  },
  { text:'Design System',  sub:'Source de vérité unique',     c:'orange', icon:'✦',  tags:['SCALE','COHÉRENCE'],   foot:'RÉFÉRENTIEL GLOBAL',sx:'5%',  sy:'62%', rot:-9,  z:5  },
  { text:'Impact & KPIs',  sub:'Mesure et retours terrain',   c:'green',  icon:'📊', tags:['ROI','MÉTRIQUES'],     foot:'PROUVER LA VALEUR', sx:'29%', sy:'59%', rot:12,  z:9  },
  { text:'Process',        sub:'Workflows clarifiés',         c:'teal',   icon:'⚙',  tags:['FLOW','EFFICACITÉ'],   foot:'MOINS DE FRICTION', sx:'53%', sy:'57%', rot:-13, z:2  },
  { text:'Documentation',  sub:'Tout écrit, retrouvable',     c:'purple', icon:'📝', tags:['GUIDELINES','ONBOARDING'], foot:'ZÉRO PERTE INFO',   sx:'68%', sy:'62%', rot:7,   z:1  },
];

/* ── BUILD ── */
const container = document.getElementById('postits-container');
const ptEls = [];

PT.forEach((d, i) => {
  const el = document.createElement('div');
  el.className = 'pt';
  el.setAttribute('data-c', d.c);
  el.innerHTML = `
    <div class="pt-face">
      <div class="pt-logo">${d.icon}</div>
      <span class="pt-title">${d.text}</span>
      <span class="pt-sub">${d.sub}</span>
      <div class="pt-tags">${d.tags.map(t=>`<span class="pt-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="pt-foot">
      <span class="pt-foot-txt">${d.foot}</span>
      <span class="pt-foot-dot">·</span>
    </div>`;
  el.style.left   = d.sx;
  el.style.top    = d.sy;
  el.style.zIndex = d.z;
  container.appendChild(el);
  ptEls.push(el);
});

/* ── RAF FLOAT — skip dragged cards ── */
let floatActive = false, floatT = 0;
function startFloat() {
  floatActive = true;
  function tick() {
    if (!floatActive) return;
    floatT += 0.009;
    ptEls.forEach((el, i) => {
      if (el.classList.contains('dragging') || el.dataset.dragged === '1') return;
      const dy = Math.sin(floatT * 0.85 + i * 1.25) * 7;
      const dr = Math.sin(floatT * 0.55 + i * 0.95) * 1.4;
      el.style.transform = `rotate(${PT[i].rot + dr}deg) translateY(${dy}px)`;
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function stopFloat() { floatActive = false; }
startFloat();

/* ══════════════════════════════════════
   DRAG & DROP
══════════════════════════════════════ */
let topZ = 100;

function enableDrag(el, idx) {
  let startX, startY, origX, origY, dragging = false;

  const getPoint = e => {
    if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  };

  const onDown = e => {
    if (organized) return; // disable during organize animation
    e.preventDefault();
    const p = getPoint(e);
    startX = p.x;
    startY = p.y;
    const rect = el.getBoundingClientRect();
    const parentRect = el.parentElement.getBoundingClientRect();
    origX = rect.left - parentRect.left;
    origY = rect.top - parentRect.top;

    // freeze the card at its current visual position (kill float for it)
    el.dataset.dragged = '1';
    el.style.left = origX + 'px';
    el.style.top  = origY + 'px';
    el.style.transform = `rotate(${PT[idx].rot}deg)`; // keep its base rotation
    el.style.transition = 'none';
    el.style.zIndex = ++topZ;
    el.classList.add('dragging');
    dragging = true;

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  };

  const onMove = e => {
    if (!dragging) return;
    e.preventDefault();
    const p = getPoint(e);
    const dx = p.x - startX;
    const dy = p.y - startY;
    el.style.left = (origX + dx) + 'px';
    el.style.top  = (origY + dy) + 'px';
    // tiny tilt while dragging for liveliness
    const tilt = Math.max(-8, Math.min(8, dx * 0.04));
    el.style.transform = `rotate(${PT[idx].rot + tilt}deg) scale(1.04)`;
  };

  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    el.style.transition = 'transform .3s cubic-bezier(.34,1.4,.64,1), box-shadow .2s ease';
    el.style.transform = `rotate(${PT[idx].rot}deg)`;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  };

  el.addEventListener('mousedown', onDown);
  el.addEventListener('touchstart', onDown, { passive: false });
}

ptEls.forEach((el, i) => enableDrag(el, i));

/* ── CONFETTI ── */
const CONF_COLORS = ['#037887','#DCF4FC','#815491','#FBE6FF','#FF6724','#FEF0E7','#247C19','#EAF9C2'];
function confettiBurst(ox, oy) {
  for (let i = 0; i < 32; i++) {
    const el   = document.createElement('div');
    const col  = CONF_COLORS[i % CONF_COLORS.length];
    const size = 6 + Math.random() * 12;
    const ang  = (i / 32) * Math.PI * 2 + Math.random() * 0.5;
    const dist = 60 + Math.random() * 140;
    const dx   = Math.cos(ang) * dist;
    const dy   = Math.sin(ang) * dist + 30;
    const r0   = Math.random() * 360;
    const r1   = r0 + (Math.random() > .5 ? 1 : -1) * (200 + Math.random() * 160);
    const dur  = 0.7 + Math.random() * 0.6;
    const shp  = Math.random() > 0.4 ? '50%' : (Math.random() > .5 ? '4px' : '2px');
    el.style.cssText = `
      position:fixed;left:${ox}px;top:${oy}px;
      width:${size}px;height:${size}px;
      background:${col};border-radius:${shp};
      pointer-events:none;z-index:99999;
      transform:rotate(${r0}deg) translate(0,0);
      opacity:1;
      transition:transform ${dur}s cubic-bezier(.2,.9,.3,1),
                 opacity   ${dur*.6}s ease ${dur*.4}s;`;
    document.body.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `rotate(${r1}deg) translate(${dx}px,${dy}px)`;
      el.style.opacity   = '0';
    }));
    setTimeout(() => el.remove(), (dur + 0.3) * 1000);
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ════════════════════════════════
   MAIN ANIMATION
════════════════════════════════ */
let organized = false;

async function organizeAnimation() {
  if (organized) return;
  organized = true;
  stopFloat();

  // Hide the organize button
  document.getElementById('organize-area').classList.add('hide');

  // freeze cards at current visual position & disable drag
  ptEls.forEach((el, i) => {
    const r = el.getBoundingClientRect();
    const pr = el.parentElement.getBoundingClientRect();
    el.dataset.dragged = '1';
    el.style.transition = 'none';
    el.style.left = (r.left - pr.left) + 'px';
    el.style.top  = (r.top - pr.top) + 'px';
    el.style.transform = `rotate(${PT[i].rot}deg)`;
    el.style.pointerEvents = 'none';
  });
  // force reflow
  void ptEls[0].offsetWidth;

  /* PHASE 1 : SHAKE */
  for (let s = 0; s < 5; s++) {
    ptEls.forEach((el, i) => {
      const dx = (Math.random() - 0.5) * 7;
      const dy = (Math.random() - 0.5) * 7;
      el.style.transition = 'transform .07s ease';
      el.style.transform  = `rotate(${PT[i].rot}deg) translate(${dx}px,${dy}px)`;
    });
    await sleep(85);
  }
  ptEls.forEach((el, i) => { el.style.transform = `rotate(${PT[i].rot}deg)`; });
  await sleep(100);

  /* PHASE 2 : FLY & STACK */
  const panel  = document.getElementById('stage');
  const pw     = panel.offsetWidth;
  const ph     = panel.offsetHeight;
  const stackX = pw / 2 - 108;
  const stackY = ph / 2 - 80;

  ptEls.forEach((el, i) => {
    const delay  = i * 40;
    const sRot   = (i - ptEls.length / 2) * 2.8;
    const jx     = (Math.random() - 0.5) * 12;
    const jy     = (Math.random() - 0.5) * 10;
    setTimeout(() => {
      el.style.transition = `left .46s cubic-bezier(.34,1.1,.64,1),
                             top  .46s cubic-bezier(.34,1.4,.64,1),
                             transform .46s cubic-bezier(.34,1.1,.64,1)`;
      el.style.left      = (stackX + jx) + 'px';
      el.style.top       = (stackY + jy) + 'px';
      el.style.transform = `rotate(${sRot}deg)`;
      el.style.zIndex    = i + 5;
    }, delay);
  });
  await sleep(ptEls.length * 40 + 480);

  /* PHASE 3 : PULSE */
  ptEls.forEach(el => {
    el.style.transition = 'transform .15s cubic-bezier(.34,1.56,.64,1)';
    el.style.transform  = el.style.transform.replace(/scale\([^)]+\)/g,'') + ' scale(1.1)';
  });
  await sleep(160);
  ptEls.forEach(el => {
    el.style.transition = 'transform .18s ease-out';
    el.style.transform  = el.style.transform.replace(' scale(1.1)','');
  });
  await sleep(180);

  /* PHASE 4 : VANISH */
  ptEls.forEach((el, i) => {
    setTimeout(() => {
      el.style.transition = 'opacity .25s ease, transform .25s cubic-bezier(.4,0,1,1)';
      el.style.opacity    = '0';
      el.style.transform  += ' scale(0.6)';
    }, i * 20);
  });
  await sleep(350);

  /* PHASE 5 : CONFETTI */
  const pr = panel.getBoundingClientRect();
  confettiBurst(pr.left + pr.width / 2, pr.top + pr.height / 2);
  await sleep(400);

  /* PHASE 6 : BOOK RISES */
  const book = document.getElementById('book3d');
  book.classList.add('entering');
  await sleep(700);

  /* PHASE 7 : FLOAT */
  book.classList.add('floating');

  // Notify Framer parent that animation is complete
  window.parent.postMessage({ type: 'animation-done' }, '*');
}

function resetAnimation() {
  organized = false;
  const book = document.getElementById('book3d');
  book.classList.remove('entering','floating');

  // Show the organize button again
  document.getElementById('organize-area').classList.remove('hide');

  ptEls.forEach((el, i) => {
    el.style.transition = 'none';
    el.style.opacity    = '1';
    el.style.zIndex     = PT[i].z;
    el.style.pointerEvents = '';
    delete el.dataset.dragged;
    void el.offsetWidth;
    el.style.left       = PT[i].sx;
    el.style.top        = PT[i].sy;
    el.style.transform  = `rotate(${PT[i].rot}deg)`;
  });
  topZ = 100;
  requestAnimationFrame(() => {
    ptEls.forEach(el => { el.style.transition = ''; });
  });
  floatT = 0;
  startFloat();
}

/* ══════════════════════════════════════
   BUTTON LISTENER
══════════════════════════════════════ */
document.getElementById('organize-btn').addEventListener('click', organizeAnimation);

/* ══════════════════════════════════════
   POSTMESSAGE — Framer can also send commands here
══════════════════════════════════════ */
window.addEventListener('message', (e) => {
  if (e.data === 'organize' || e.data?.type === 'organize') {
    organizeAnimation();
  }
  if (e.data === 'reset' || e.data?.type === 'reset') {
    resetAnimation();
  }
});
</script>
</body>
</html>
